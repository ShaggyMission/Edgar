name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - qa
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Lint & Validate
  # ─────────────────────────────────────────
  lint:
    name: 🔍 Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate HTML
        run: |
          echo "✅ Validating HTML files..."
          if [ -f index.html ]; then
            echo "index.html found — OK"
          else
            echo "❌ index.html not found!" && exit 1
          fi

  # ─────────────────────────────────────────
  # JOB 2: Build
  # ─────────────────────────────────────────
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simulate build
        run: |
          echo "🏗️ Building project..."
          mkdir -p dist
          cp index.html dist/index.html
          echo "✅ Build complete. Files in dist/:"
          ls dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/

  # ─────────────────────────────────────────
  # JOB 3: Test
  # ─────────────────────────────────────────
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tests
        run: |
          echo "🧪 Running tests..."
          echo "✅ All tests passed."

  # ─────────────────────────────────────────
  # JOB 4: Deploy (solo en main)
  # ─────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: dist/

      - name: Deploy
        run: |
          echo "🚀 Deploying to production..."
          echo "✅ Deploy successful!"
