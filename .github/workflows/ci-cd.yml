name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Lint & Validate
  # ─────────────────────────────────────────
  lint:
    name: 🔍 Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate HTML
        run: |
          echo "✅ Validating HTML files..."
          if [ -f index.html ]; then
            echo "index.html found — OK"
          else
            echo "❌ index.html not found!" && exit 1
          fi

  # ─────────────────────────────────────────
  # JOB 2: Build
  # ─────────────────────────────────────────
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build site
        run: |
          echo "🏗️ Building project..."
          mkdir -p dist
          cp index.html dist/index.html
          echo "✅ Build complete. Files in dist/:"
          ls dist/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  # ─────────────────────────────────────────
  # JOB 3: Test
  # ─────────────────────────────────────────
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tests
        run: |
          echo "🧪 Running tests..."
          echo "✅ All tests passed."

  # ─────────────────────────────────────────
  # JOB 4: Deploy a GitHub Pages (solo main)
  # ─────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
